<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configuración de publicaciones</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .posts-main { padding: 20px; max-width: 1200px; margin: 0 auto; }
      .stats { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
      .posts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }
      .post-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .post-card.has-text { border-color: var(--primary); }
      .post-media {
        position: relative;
        background: var(--panel-2);
        aspect-ratio: 1/1;
        overflow: hidden;
      }
      .post-media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .post-media img.loaded { opacity: 1; }
      .post-media::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, var(--panel-2) 0%, var(--panel) 50%, var(--panel-2) 100%);
        background-size: 200% 100%;
        animation: shimmer 1.6s ease-in-out infinite;
        pointer-events: none;
      }
      .post-media.loaded::before { display: none; }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .post-tag {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(0,0,0,0.7);
        color: white;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        z-index: 2;
      }
      .post-tag.has-text { background: var(--primary); }
      .post-stats-tag {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(0,0,0,0.7);
        color: white;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 4px;
        z-index: 2;
        font-variant-numeric: tabular-nums;
      }
      .post-body {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .post-meta {
        font-size: 11px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
      }
      .post-id {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: var(--muted);
        word-break: break-all;
      }
      .post-id-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .post-id-row button {
        padding: 2px 6px;
        font-size: 11px;
      }
      .post-caption {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.4;
        max-height: 2.8em;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .post-textarea {
        width: 100%;
        min-height: 56px;
        padding: 6px 8px;
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: inherit;
        font-size: 12px;
        resize: vertical;
      }
      .post-textarea:focus {
        outline: none;
        border-color: var(--primary);
      }
      .post-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .post-actions .btn {
        padding: 5px 12px;
        font-size: 12px;
      }
      .empty-msg {
        padding: 60px 20px;
        text-align: center;
        color: var(--muted);
      }
      .err-banner {
        background: rgba(224, 83, 83, 0.1);
        border: 1px solid var(--danger);
        color: var(--danger);
        padding: 14px;
        border-radius: 8px;
        margin-bottom: 14px;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <h1>Configuración de publicaciones</h1>
      <a href="/" class="btn">Volver</a>
      <button id="btn-refresh" class="btn">Actualizar</button>
    </header>

    <main class="posts-main">
      <div id="err" class="err-banner" hidden></div>
      <div id="stats" class="stats">Cargando…</div>
      <div id="grid" class="posts-grid"></div>
      <div id="empty" class="empty-msg" hidden>No hay publicaciones.</div>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const grid = $('grid');
      const empty = $('empty');
      const stats = $('stats');
      const errEl = $('err');
      const toast = $('toast');

      function showToast(msg, err = false) {
        toast.textContent = msg;
        toast.classList.toggle('err', err);
        toast.hidden = false;
        setTimeout(() => toast.hidden = true, 2500);
      }

      function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, (m) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
        }[m]));
      }

      function fmtTimestamp(iso) {
        if (!iso) return '';
        return new Date(iso).toLocaleString('es-AR', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit',
          timeZone: 'America/Argentina/Buenos_Aires',
        });
      }

      function typeLabel(media_type) {
        if (media_type === 'VIDEO') return 'Video';
        if (media_type === 'REELS') return 'Reel';
        if (media_type === 'CAROUSEL_ALBUM') return 'Carrusel';
        return 'Imagen';
      }

      function renderCard(p) {
        const card = document.createElement('div');
        card.className = 'post-card' + (p.text ? ' has-text' : '');
        card.dataset.id = p.id;

        const igUrl = (p.media_type === 'VIDEO' || p.media_type === 'REELS')
          ? (p.thumbnail_url || p.media_url)
          : p.media_url;
        const cachedUrl = p.cached_url;

        const stats = (p.like_count != null || p.comments_count != null)
          ? `<span class="post-stats-tag">${p.like_count ?? 0} ♥ · ${p.comments_count ?? 0} 💬</span>`
          : '';

        card.innerHTML = `
          <div class="post-media">
            <span class="post-tag ${p.text ? 'has-text' : ''}">${typeLabel(p.media_type)}${p.text ? ' · con texto' : ''}</span>
            ${stats}
            ${cachedUrl
              ? `<img src="${escapeHtml(cachedUrl)}" data-fallback="${escapeHtml(igUrl || '')}" alt="post" loading="lazy" decoding="async" referrerpolicy="no-referrer" />`
              : igUrl
                ? `<img src="${escapeHtml(igUrl)}" alt="post" loading="lazy" decoding="async" referrerpolicy="no-referrer" />`
                : '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:12px;position:relative;z-index:1;">Sin preview</div>'}
          </div>
          <div class="post-body">
            ${p.caption ? `<div class="post-caption">${escapeHtml(p.caption)}</div>` : ''}
            <div class="post-meta">
              <span>${fmtTimestamp(p.timestamp)}</span>
              ${p.permalink ? `<a href="${escapeHtml(p.permalink)}" target="_blank" rel="noreferrer" style="color:var(--primary);">Ver en IG ↗</a>` : ''}
            </div>
            <div class="post-id-row">
              <span class="post-id">ID: ${escapeHtml(p.id)}</span>
              <button class="btn btn-copy-id" type="button" title="Copiar ID">📋</button>
            </div>
            <textarea class="post-textarea" placeholder="Texto a devolver cuando alguien comente esta publicación…">${escapeHtml(p.text || '')}</textarea>
            <div class="post-actions">
              ${p.text ? '<button class="btn btn-delete">Borrar texto</button>' : ''}
              <button class="btn btn-primary btn-save">Guardar</button>
            </div>
          </div>`;
        return card;
      }

      let allPosts = [];

      async function load() {
        errEl.hidden = true;
        stats.textContent = 'Cargando publicaciones…';
        grid.innerHTML = '';
        empty.hidden = true;
        try {
          const r = await fetch('/api/posts?limit=50');
          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${r.status}`);
          }
          const data = await r.json();
          allPosts = data.posts || [];
          stats.textContent = `${data.total} publicacion${data.total === 1 ? '' : 'es'} · ${allPosts.filter((p) => p.text).length} con texto asignado`;
          if (!allPosts.length) {
            empty.hidden = false;
            return;
          }
          for (const p of allPosts) {
            grid.appendChild(renderCard(p));
          }
        } catch (err) {
          errEl.hidden = false;
          errEl.textContent = 'Error: ' + err.message;
          stats.textContent = '';
        }
      }

      grid.addEventListener('load', (ev) => {
        if (ev.target.tagName === 'IMG') {
          ev.target.classList.add('loaded');
          ev.target.closest('.post-media')?.classList.add('loaded');
        }
      }, true);

      grid.addEventListener('error', (ev) => {
        if (ev.target.tagName !== 'IMG') return;
        const fallback = ev.target.dataset.fallback;
        if (fallback && ev.target.src !== fallback) {
          ev.target.src = fallback;
          ev.target.removeAttribute('data-fallback');
        }
      }, true);

      grid.addEventListener('click', async (ev) => {
        const card = ev.target.closest('.post-card');
        if (!card) return;
        const id = card.dataset.id;

        if (ev.target.closest('.btn-copy-id')) {
          await navigator.clipboard.writeText(id);
          showToast('ID copiado');
          return;
        }

        if (ev.target.closest('.btn-save')) {
          const ta = card.querySelector('.post-textarea');
          const text = ta.value.trim();
          if (!text) {
            showToast('El texto está vacío', true);
            return;
          }
          try {
            const r = await fetch(`/api/posts/${encodeURIComponent(id)}/text`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text }),
            });
            if (!r.ok) {
              const err = await r.json().catch(() => ({}));
              throw new Error(err.error || `HTTP ${r.status}`);
            }
            showToast('Texto guardado');
            const p = allPosts.find((x) => x.id === id);
            if (p) {
              p.text = text;
              const newCard = renderCard(p);
              card.replaceWith(newCard);
              const c = allPosts.filter((x) => x.text).length;
              stats.textContent = `${allPosts.length} publicaciones · ${c} con texto asignado`;
            }
          } catch (err) {
            showToast('Error: ' + err.message, true);
          }
          return;
        }

        if (ev.target.closest('.btn-delete')) {
          if (!confirm('¿Borrar el texto asignado a esta publicación?')) return;
          try {
            const r = await fetch(`/api/posts/${encodeURIComponent(id)}/text`, { method: 'DELETE' });
            if (!r.ok) {
              const err = await r.json().catch(() => ({}));
              throw new Error(err.error || `HTTP ${r.status}`);
            }
            showToast('Texto borrado');
            const p = allPosts.find((x) => x.id === id);
            if (p) {
              p.text = '';
              const newCard = renderCard(p);
              card.replaceWith(newCard);
              const c = allPosts.filter((x) => x.text).length;
              stats.textContent = `${allPosts.length} publicaciones · ${c} con texto asignado`;
            }
          } catch (err) {
            showToast('Error: ' + err.message, true);
          }
        }
      });

      $('btn-refresh').addEventListener('click', load);

      load();
    </script>
  </body>
</html>
