<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editor de Eventos</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Eventos</h1>
      <a href="/preview" class="btn">Vista previa</a>
      <a href="/lista" class="btn">Lista de eventos</a>
      <a href="/stories" class="btn">Historias</a>
      <a href="/usage" class="btn">Consumo</a>
      <button id="btn-nuevo" class="btn btn-primary">+ Nuevo evento</button>
    </header>

    <main>
      <div class="toolbar">
        <input id="search" type="search" placeholder="Buscar evento…" autocomplete="off" />
        <p id="master-info" class="master-info"></p>
      </div>
      <div id="grid" class="grid"></div>
      <p id="empty" class="empty" hidden>Aún no hay eventos. Creá uno nuevo.</p>
      <p id="no-results" class="empty" hidden>No hay resultados para esta búsqueda.</p>
    </main>


    <dialog id="dlg-nuevo">
      <form method="dialog">
        <h2>Nuevo evento</h2>
        <label>Título<input id="nuevo-title" type="text" required /></label>
        <div class="dlg-actions">
          <button value="cancel">Cancelar</button>
          <button id="nuevo-ok" value="default" class="btn-primary">Crear</button>
        </div>
      </form>
    </dialog>

    <script src="/js/app.js"></script>
  </body>
</html>
