<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configuración de historias</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .stories-main { padding: 20px; max-width: 1200px; margin: 0 auto; }
      .stats { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 14px;
      }
      .stories-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }
      .story-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .story-card.has-text { border-color: var(--primary); }
      .story-media {
        position: relative;
        background: var(--panel-2);
        aspect-ratio: 9/16;
        overflow: hidden;
      }
      .story-media img,
      .story-media video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .story-media img.loaded,
      .story-media video.loaded { opacity: 1; }
      .story-media::before {
        /* Skeleton shimmer mientras la imagen no cargó. Se oculta con la clase .loaded. */
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, var(--panel-2) 0%, var(--panel) 50%, var(--panel-2) 100%);
        background-size: 200% 100%;
        animation: shimmer 1.6s ease-in-out infinite;
        pointer-events: none;
      }
      .story-media.loaded::before { display: none; }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .story-tag {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(0,0,0,0.7);
        color: white;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .story-tag.has-text {
        background: var(--primary);
      }
      .story-body {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .story-meta {
        font-size: 11px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
      }
      .story-id {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: var(--muted);
        word-break: break-all;
      }
      .story-id-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .story-id-row button {
        padding: 2px 6px;
        font-size: 11px;
      }
      .story-textarea {
        width: 100%;
        min-height: 56px;
        padding: 6px 8px;
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: inherit;
        font-size: 12px;
        resize: vertical;
      }
      .story-textarea:focus {
        outline: none;
        border-color: var(--primary);
      }
      .story-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .story-actions .btn {
        padding: 5px 12px;
        font-size: 12px;
      }
      .empty-msg {
        padding: 60px 20px;
        text-align: center;
        color: var(--muted);
      }
      .err-banner {
        background: rgba(224, 83, 83, 0.1);
        border: 1px solid var(--danger);
        color: var(--danger);
        padding: 14px;
        border-radius: 8px;
        margin-bottom: 14px;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <h1>Configuración de historias</h1>
      <a href="/" class="btn">Volver</a>
      <button id="btn-refresh" class="btn">Actualizar</button>
    </header>

    <main class="stories-main">
      <div id="err" class="err-banner" hidden></div>
      <div id="stats" class="stats">Cargando…</div>
      <div id="grid" class="stories-grid"></div>
      <div id="empty" class="empty-msg" hidden>No hay historias activas en este momento.</div>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const grid = $('grid');
      const empty = $('empty');
      const stats = $('stats');
      const errEl = $('err');
      const toast = $('toast');

      function showToast(msg, err = false) {
        toast.textContent = msg;
        toast.classList.toggle('err', err);
        toast.hidden = false;
        setTimeout(() => toast.hidden = true, 2500);
      }

      function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, (m) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
        }[m]));
      }

      function fmtTimestamp(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleString('es-AR', {
          day: '2-digit', month: '2-digit',
          hour: '2-digit', minute: '2-digit',
          timeZone: 'America/Argentina/Buenos_Aires',
        });
      }

      function renderCard(s) {
        const card = document.createElement('div');
        card.className = 'story-card' + (s.text ? ' has-text' : '');
        card.dataset.id = s.id;

        const isVideo = s.media_type === 'VIDEO';
        // Preferimos la URL cacheada local. Fallback a la URL de IG si la
        // cache aún no está lista (404 → onerror dispara el fallback).
        const igUrl = isVideo ? (s.thumbnail_url || s.media_url) : s.media_url;
        const cachedUrl = s.cached_url;

        card.innerHTML = `
          <div class="story-media">
            <span class="story-tag ${s.text ? 'has-text' : ''}">${isVideo ? 'Video' : 'Imagen'}${s.text ? ' · con texto' : ''}</span>
            ${cachedUrl
              ? `<img src="${escapeHtml(cachedUrl)}" data-fallback="${escapeHtml(igUrl || '')}" alt="story" loading="lazy" decoding="async" referrerpolicy="no-referrer" />`
              : igUrl
                ? `<img src="${escapeHtml(igUrl)}" alt="story" loading="lazy" decoding="async" referrerpolicy="no-referrer" />`
                : '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:12px;position:relative;z-index:1;">Sin preview</div>'}
          </div>
          <div class="story-body">
            <div class="story-meta">
              <span>${fmtTimestamp(s.timestamp)}</span>
              ${s.permalink ? `<a href="${escapeHtml(s.permalink)}" target="_blank" rel="noreferrer" style="color:var(--primary);">Ver en IG ↗</a>` : ''}
            </div>
            <div class="story-id-row">
              <span class="story-id">ID: ${escapeHtml(s.id)}</span>
              <button class="btn btn-copy-id" type="button" title="Copiar ID">📋</button>
            </div>
            <textarea class="story-textarea" placeholder="Texto a devolver cuando alguien consulte esta historia…">${escapeHtml(s.text || '')}</textarea>
            <div class="story-actions">
              ${s.text ? '<button class="btn btn-delete">Borrar texto</button>' : ''}
              <button class="btn btn-primary btn-save">Guardar</button>
            </div>
          </div>`;
        return card;
      }

      let allStories = [];

      async function load() {
        errEl.hidden = true;
        stats.textContent = 'Cargando historias activas…';
        grid.innerHTML = '';
        empty.hidden = true;
        try {
          const r = await fetch('/api/stories');
          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${r.status}`);
          }
          const data = await r.json();
          allStories = data.stories || [];
          stats.textContent = `${data.total} historia${data.total === 1 ? '' : 's'} activa${data.total === 1 ? '' : 's'} · ${allStories.filter((s) => s.text).length} con texto asignado`;
          if (!allStories.length) {
            empty.hidden = false;
            return;
          }
          for (const s of allStories) {
            grid.appendChild(renderCard(s));
          }
        } catch (err) {
          errEl.hidden = false;
          errEl.textContent = 'Error: ' + err.message;
          stats.textContent = '';
        }
      }

      // Cuando la imagen termina de cargar, sacar el skeleton.
      grid.addEventListener('load', (ev) => {
        if (ev.target.tagName === 'IMG') {
          ev.target.classList.add('loaded');
          ev.target.closest('.story-media')?.classList.add('loaded');
        }
      }, true);

      // Si la imagen cacheada falla (todavía no se descargó al server), reintentar
      // con la URL original de IG. Solo una vez para no bucle.
      grid.addEventListener('error', (ev) => {
        if (ev.target.tagName !== 'IMG') return;
        const fallback = ev.target.dataset.fallback;
        if (fallback && ev.target.src !== fallback) {
          ev.target.src = fallback;
          ev.target.removeAttribute('data-fallback');
        }
      }, true);

      grid.addEventListener('click', async (ev) => {
        const card = ev.target.closest('.story-card');
        if (!card) return;
        const id = card.dataset.id;

        if (ev.target.closest('.btn-copy-id')) {
          await navigator.clipboard.writeText(id);
          showToast('ID copiado');
          return;
        }

        if (ev.target.closest('.btn-save')) {
          const ta = card.querySelector('.story-textarea');
          const text = ta.value.trim();
          if (!text) {
            showToast('El texto está vacío', true);
            return;
          }
          try {
            const r = await fetch(`/api/stories/${encodeURIComponent(id)}/text`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text }),
            });
            if (!r.ok) {
              const err = await r.json().catch(() => ({}));
              throw new Error(err.error || `HTTP ${r.status}`);
            }
            showToast('Texto guardado');
            // Re-render solo este card para reflejar el estado.
            const s = allStories.find((x) => x.id === id);
            if (s) {
              s.text = text;
              const newCard = renderCard(s);
              card.replaceWith(newCard);
              stats.textContent = `${allStories.length} historias activas · ${allStories.filter((s) => s.text).length} con texto asignado`;
            }
          } catch (err) {
            showToast('Error: ' + err.message, true);
          }
          return;
        }

        if (ev.target.closest('.btn-delete')) {
          if (!confirm('¿Borrar el texto asignado a esta historia?')) return;
          try {
            const r = await fetch(`/api/stories/${encodeURIComponent(id)}/text`, {
              method: 'DELETE',
            });
            if (!r.ok) {
              const err = await r.json().catch(() => ({}));
              throw new Error(err.error || `HTTP ${r.status}`);
            }
            showToast('Texto borrado');
            const s = allStories.find((x) => x.id === id);
            if (s) {
              s.text = '';
              const newCard = renderCard(s);
              card.replaceWith(newCard);
              stats.textContent = `${allStories.length} historias activas · ${allStories.filter((s) => s.text).length} con texto asignado`;
            }
          } catch (err) {
            showToast('Error: ' + err.message, true);
          }
        }
      });

      $('btn-refresh').addEventListener('click', load);

      load();
    </script>
  </body>
</html>
